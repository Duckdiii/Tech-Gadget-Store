server:
  port: 8080 # Port để chạy API cục bộ (http://localhost:8080)

momo:
  endpoint: ${MOMO_ENDPOINT}
  partner-code: ${MOMO_PARTNER_CODE}
  access-key: ${MOMO_ACCESS_KEY}
  secret-key: ${MOMO_SECRET_KEY}
  redirect-url: ${MOMO_REDIRECT_URL}
  ipn-url: ${MOMO_IPN_URL}

vnpay:
  pay-url: ${VNPAY_URL}
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  return-url: ${VNPAY_RETURN_URL}
  ipn-url: ${VNPAY_IPN_URL}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: tech-gadget-store

  # 1. Cấu hình Kết nối CSDL (JPA/Hibernate)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 2. Redis chưa dùng — sẽ bổ sung khi triển khai Giỏ hàng

  # 3. Cấu hình SMTP mail (Gmail)
  mail:
    host: ${EMAIL_SMTP_HOST:smtp.gmail.com}
    port: ${EMAIL_SMTP_PORT:465}
    username: ${EMAIL_SMTP_USER}
    password: ${EMAIL_SMTP_PASS}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: ${EMAIL_SMTP_SECURE:true}
          connectiontimeout: ${EMAIL_SMTP_CONNECTION_TIMEOUT_MS:30000}
          timeout: ${EMAIL_SMTP_SOCKET_TIMEOUT_MS:30000}
          writetimeout: ${EMAIL_SMTP_SOCKET_TIMEOUT_MS:30000}
          greetingtimeout: ${EMAIL_SMTP_GREETING_TIMEOUT_MS:30000}

# 3. Cấu hình Chìa khóa bảo mật JWT (Cho phần Đăng nhập)
app:
  jwt:
    # Secret key phải dài và khó đoán. Bạn có thể đổi lại tùy ý.
    secret: ${JWT_SECRET}
    # Thời gian sống của token: 86400000 ms = 24 giờ
    expiration-ms: 86400000
  email:
    from-name: ${EMAIL_FROM_NAME:TechStore System}
    from-address: ${EMAIL_FROM_ADDRESS}
    reply-to-mode: ${EMAIL_REPLY_TO_MODE:customer}
    reply-to-address: ${EMAIL_REPLY_TO_ADDRESS:}
  payment:
    # false = production, true = sandbox (mặc định)
    default-sandbox-mode: ${PAYMENT_SANDBOX_MODE:true}
    timeout-minutes: ${PAYMENT_TIMEOUT_MINUTES:15}
    test-auto-complete: ${PAYMENT_TEST_AUTO_COMPLETE:false}
    momo:
      sandbox:
        enabled: true
        partner-code: ${MOMO_PARTNER_CODE}
        access-key: ${MOMO_ACCESS_KEY}
        secret-key: ${MOMO_SECRET_KEY}
        public-key: ${MOMO_PUBLIC_KEY:}
        endpoint: ${MOMO_ENDPOINT}
        redirect-url: ${MOMO_REDIRECT_URL}
        ipn-url: ${MOMO_IPN_URL}
        request-type: ${MOMO_REQUEST_TYPE:captureWallet}
        partner-name: ${MOMO_PARTNER_NAME:TechStore}
        store-id: ${MOMO_STORE_ID:TechStore001}
        lang: ${MOMO_LANG:vi}
        fee-rate: 0.02
      production:
        enabled: false
        partner-code: ${MOMO_PARTNER_CODE_PROD:${MOMO_PARTNER_CODE:}}
        access-key: ${MOMO_ACCESS_KEY_PROD:}
        secret-key: ${MOMO_SECRET_KEY_PROD:}
        public-key: ${MOMO_PUBLIC_KEY_PROD:}
        endpoint: ${MOMO_ENDPOINT_PROD:https://payment.momo.vn/v2/gateway/api/create}
        redirect-url: ${MOMO_REDIRECT_URL_PROD:}
        ipn-url: ${MOMO_IPN_URL_PROD:}
        request-type: ${MOMO_REQUEST_TYPE_PROD:captureWallet}
        partner-name: ${MOMO_PARTNER_NAME_PROD:}
        store-id: ${MOMO_STORE_ID_PROD:}
        lang: ${MOMO_LANG_PROD:vi}
        fee-rate: 0.02
    vnpay:
      sandbox:
        enabled: true
        version: ${VNPAY_VERSION:2.1.0}
        payment-url: ${VNPAY_PAYMENT_URL}
        tmn-code: ${VNPAY_TMN_CODE}
        hash-secret: ${VNPAY_HASH_SECRET}
        secure-secret: ${VNPAY_SECURE_SECRET:${VNPAY_HASH_SECRET}}
        url: ${VNPAY_URL}
        endpoint: ${VNPAY_URL}
        api-endpoint: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
        fee-rate: 0.01
        return-url: ${VNPAY_RETURN_URL}
        ipn-url: ${VNPAY_IPN_URL}
        locale: ${VNPAY_LOCALE:vn}
        order-type: ${VNPAY_ORDER_TYPE:200000}
      production:
        enabled: false
        version: ${VNPAY_VERSION_PROD:2.1.0}
        payment-url: ${VNPAY_PAYMENT_URL_PROD:}
        tmn-code: ${VNPAY_TMN_CODE_PROD:}
        hash-secret: ${VNPAY_HASH_SECRET_PROD:}
        secure-secret: ${VNPAY_SECURE_SECRET_PROD:}
        url: ${VNPAY_URL_PROD:https://payment.vnpayment.vn/vpcpay.html}
        endpoint: ${VNPAY_URL_PROD:https://payment.vnpayment.vn/vpcpay.html}
        api-endpoint: https://api.vnpayment.vn/merchant_webapi/api/transaction
        fee-rate: 0.01
        return-url: ${VNPAY_RETURN_URL_PROD:}
        ipn-url: ${VNPAY_IPN_URL_PROD:}
        locale: ${VNPAY_LOCALE_PROD:vn}
        order-type: ${VNPAY_ORDER_TYPE_PROD:200000}
